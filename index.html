<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex, nofollow">
  <title>Sign in · Agent Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#17201d;--muted:#69746f;--line:#dfe4df;--green:#1e6b4f;--green-dark:#124d39}*{box-sizing:border-box}
    body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;color:var(--ink);font-family:"DM Sans",sans-serif;background:radial-gradient(circle at 70% 5%,rgba(98,151,125,.2),transparent 30rem),#f3f5f2}
    .login{width:min(100%,430px);padding:38px;border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.94);box-shadow:0 24px 70px rgba(26,46,38,.12)}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:42px;font-family:Manrope,sans-serif;font-weight:800;letter-spacing:-.03em}.brand-mark{width:36px;height:36px;border-radius:11px;display:grid;grid-template-columns:repeat(3,1fr);align-items:end;gap:3px;padding:8px;background:var(--green)}.brand-mark i{display:block;border-radius:2px;background:white}.brand-mark i:nth-child(1){height:8px;opacity:.6}.brand-mark i:nth-child(2){height:15px}.brand-mark i:nth-child(3){height:11px;opacity:.8}
    .eyebrow{margin:0 0 10px;color:var(--green);font-size:11px;font-weight:700;letter-spacing:.15em}h1{margin:0;font-family:Manrope,sans-serif;font-size:36px;letter-spacing:-.05em}.intro{margin:12px 0 28px;color:var(--muted);line-height:1.6}label{display:block;margin-bottom:8px;font-size:12px;font-weight:700}
    input{width:100%;height:50px;padding:0 14px;border:1px solid var(--line);border-radius:11px;outline:0;color:var(--ink);background:#f8f9f7;font:inherit}input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(30,107,79,.1)}button{width:100%;height:50px;margin-top:14px;border:0;border-radius:11px;color:white;background:var(--green);font:700 14px "DM Sans",sans-serif;cursor:pointer}button:hover{background:var(--green-dark)}.error{min-height:20px;margin:10px 0 0;color:#a43c32;font-size:12px}.privacy{display:flex;gap:8px;align-items:center;margin-top:24px;color:var(--muted);font-size:11px}@media(max-width:480px){.login{padding:28px 22px}h1{font-size:31px}}
  </style>
</head>
<body><main class="login">
  <div class="brand"><span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span><span>Agent Operations</span></div>
  <p class="eyebrow">PROTECTED DASHBOARD</p><h1>Welcome back.</h1><p class="intro">Enter the dashboard password to view Poptin agent activity and schedules.</p>
  <form id="loginForm"><label for="password">Dashboard password</label><input id="password" name="password" type="password" autocomplete="current-password" required autofocus><button type="submit">Open dashboard →</button><p class="error" id="error" role="alert"></p></form>
  <p class="privacy">◉ Access stays active only for this browser session.</p>
</main><script src="auth.js"></script></body></html>
